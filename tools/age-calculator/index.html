<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator BS | Nepali Age Calculator Online</title>
    <meta name="description" content="Calculate your exact age in years, months, and days using Bikram Sambat (BS) date. Free Nepali age calculator. Enter your birth date in BS and get your precise age.">
    <meta name="keywords" content="age calculator Nepal, Nepali age calculator, BS age calculator, Bikram Sambat age, calculate age Nepal">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://securexlab.com/tools/age-calculator/">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/nepali-date-converter/dist/nepali-date-converter.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7365011588835579"
     crossorigin="anonymous"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="../../index.html" class="text-slate-500 hover:text-blue-600 flex items-center gap-1 transition-colors group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                    <span class="font-medium">Back to Hub</span>
                </a>
                <span class="h-6 w-[1px] bg-slate-200"></span>
                <span class="font-bold text-slate-800 tracking-tight">SecureX Lab <span class="text-blue-600">Tools</span></span>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="p-8 border-b border-slate-100 bg-slate-50/50">
                <h1 class="text-2xl font-bold text-slate-800">Age Calculator (BS)</h1>
                <p class="text-slate-500 text-sm mt-1">Enter your birth date in Bikram Sambat.</p>
            </div>
            
            <div class="p-8 space-y-6">
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Year (BS)</label>
                        <input type="number" id="bsYear" placeholder="2050" class="w-full p-3 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Month</label>
                        <select id="bsMonth" class="w-full p-3 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            <option value="0">Baishakh</option>
                            <option value="1">Jestha</option>
                            <option value="2">Asar</option>
                            <option value="3">Shrawan</option>
                            <option value="4">Bhadra</option>
                            <option value="5">Ashwin</option>
                            <option value="6">Kartik</option>
                            <option value="7">Mangsir</option>
                            <option value="8">Poush</option>
                            <option value="9">Magh</option>
                            <option value="10">Falgun</option>
                            <option value="11">Chaitra</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Day</label>
                        <input type="number" id="bsDay" placeholder="15" min="1" max="32" class="w-full p-3 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                </div>

                <button onclick="calculateAge()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-200 active:scale-[0.98]">
                    Calculate Age
                </button>

                <div id="resultArea" class="hidden animate-in fade-in duration-500">
                    <div class="p-6 bg-blue-50 rounded-2xl border border-blue-100">
                        <div class="text-center">
                            <span class="text-sm text-blue-600 font-semibold uppercase tracking-wider">Current Age</span>
                            <div id="ageDisplay" class="text-3xl font-extrabold text-slate-900 mt-2"></div>
                            <p id="totalDays" class="text-sm text-slate-500 mt-2 italic"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function calculateAge() {
            const y = parseInt(document.getElementById('bsYear').value);
            const m = parseInt(document.getElementById('bsMonth').value);
            const d = parseInt(document.getElementById('bsDay').value);

            if (!y || !d) {
                alert("Please enter a valid date");
                return;
            }

            try {
                // Convert birth BS to AD
                const birthDateAD = new NepaliDate(y, m, d).toJsDate();
                const todayAD = new Date();

                let years = todayAD.getFullYear() - birthDateAD.getFullYear();
                let months = todayAD.getMonth() - birthDateAD.getMonth();
                let days = todayAD.getDate() - birthDateAD.getDate();

                if (days < 0) {
                    months--;
                    const lastMonth = new Date(todayAD.getFullYear(), todayAD.getMonth(), 0);
                    days += lastMonth.getDate();
                }

                if (months < 0) {
                    years--;
                    months += 12;
                }

                document.getElementById('resultArea').classList.remove('hidden');
                document.getElementById('ageDisplay').innerHTML = `
                    <span class="text-blue-600">${years}</span>y 
                    <span class="text-blue-600">${months}</span>m 
                    <span class="text-blue-600">${days}</span>d
                `;
                
                const diffTime = Math.abs(todayAD - birthDateAD);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                document.getElementById('totalDays').innerText = `Total lived: ${diffDays.toLocaleString()} days`;

            } catch (e) {
                alert("Invalid BS Date provided.");
            }
        }
    </script>
</body>
</html>
