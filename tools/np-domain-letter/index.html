<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.np Domain Cover Letter Generator | Mercantile Nepal</title>
    <meta name="description" content="Generate the official cover letter for .np domain registration. Free Mercantile domain application letter generator for Nepal. Create and download PDF instantly.">
    <meta name="keywords" content="np domain registration, mercantile domain, .np cover letter, domain application Nepal, mercantile domain letter generator">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://securexlab.com/tools/np-domain-letter/">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-group focus-within label { color: #2563eb; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7365011588835579"
     crossorigin="anonymous"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col text-slate-900">

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="../../index.html" class="text-slate-500 hover:text-blue-600 flex items-center gap-1 transition-all group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform group-hover:-translate-x-1" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                    Back to Hub
                </a>
                <span class="h-6 w-[1px] bg-slate-200"></span>
                <span class="font-bold text-slate-800 tracking-tight">SecureX Lab <span class="text-blue-600">Tools</span></span>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto w-full px-4 py-12">
        <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
            
            <div class="p-8 border-b border-slate-100 bg-slate-50/50">
                <h1 class="text-2xl font-bold text-slate-900">.np Domain Cover Letter</h1>
                <p class="text-slate-500 mt-1">Generate the mandatory application letter for Mercantile domain registration.</p>
            </div>

            <form id="letterForm" class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Full Name -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Full Name</label>
                        <input type="text" id="fullName" required placeholder="John Doe" 
                            class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-50 focus:border-blue-600 outline-none transition-all">
                    </div>

                    <!-- Domain Name -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Requested Domain</label>
                        <input type="text" id="domainName" required placeholder="example.com.np" 
                            class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-50 focus:border-blue-600 outline-none transition-all">
                    </div>

                    <!-- Email -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Email Address</label>
                        <input type="email" id="email" required placeholder="john@example.com" 
                            class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-50 focus:border-blue-600 outline-none transition-all">
                    </div>

                    <!-- Phone -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Phone Number</label>
                        <input type="text" id="phone" required placeholder="98XXXXXXXX" 
                            class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-50 focus:border-blue-600 outline-none transition-all">
                    </div>

                    <!-- Address -->
                    <div class="md:col-span-2 space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Permanent Address</label>
                        <input type="text" id="address" required placeholder="Kathmandu, Nepal" 
                            class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-50 focus:border-blue-600 outline-none transition-all">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="button" onclick="generatePDF()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-100 flex items-center justify-center gap-2 group">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        Generate & Download PDF
                    </button>
                </div>
            </form>
            
            <div class="p-6 bg-amber-50 border-t border-amber-100">
                <p class="text-xs text-amber-700 leading-relaxed">
                    <strong>Note:</strong> After downloading, please print the document, sign it manually, and scan it back as an image (JPG/PNG) to upload to the Mercantile portal.
                </p>
            </div>
        </div>
    </main>

    <script>
        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Get Form Values
            const name = document.getElementById('fullName').value;
            const domain = document.getElementById('domainName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            if(!name || !domain || !address) {
                alert("Please fill in all required fields.");
                return;
            }

            // PDF Configuration
            doc.setFont("helvetica", "normal");
            doc.setFontSize(11);
            let yPos = 20;
            const xPos = 20;
            const lineHeight = 7;

            // Date
            doc.text(`Date: ${date}`, xPos, yPos);
            yPos += lineHeight * 2;

            // Recipient
            doc.text("To,", xPos, yPos); yPos += lineHeight;
            doc.text("The Hostmaster,", xPos, yPos); yPos += lineHeight;
            doc.text("Mercantile Communication Pvt. Ltd.,", xPos, yPos); yPos += lineHeight;
            doc.text("Durbar Marg, Kathmandu, Nepal.", xPos, yPos); yPos += lineHeight * 2;

            // Subject
            doc.setFont("helvetica", "bold");
            doc.text(`Subject: Application for ${domain} domain registration`, xPos, yPos);
            doc.setFont("helvetica", "normal");
            yPos += lineHeight * 2;

            // Body
            doc.text("Dear Sir/Madam,", xPos, yPos);
            yPos += lineHeight * 1.5;

            const body = `I am writing this letter to request the registration of the domain name "${domain}" under my name. I have already completed the online application process and provided the required details.

I have attached a copy of my citizenship certificate (or relevant identification) for the verification process as per the requirements.

I agree to abide by all the terms and conditions set by Mercantile Communication for .np domain registration. I would be grateful if you could approve my domain request at your earliest convenience.

Thank you for your time and consideration.`;

            const splitBody = doc.splitTextToSize(body, 170);
            doc.text(splitBody, xPos, yPos);
            yPos += (splitBody.length * lineHeight) + lineHeight;

            // Closing
            doc.text("Sincerely,", xPos, yPos);
            yPos += lineHeight * 4; // Space for signature

            // Signature Line
            doc.line(xPos, yPos, xPos + 50, yPos); 
            yPos += lineHeight;

            // User Details
            doc.setFont("helvetica", "bold");
            doc.text(name, xPos, yPos);
            doc.setFont("helvetica", "normal");
            yPos += lineHeight;
            doc.text(address, xPos, yPos);
            yPos += lineHeight;
            doc.text(`Phone: ${phone}`, xPos, yPos);
            yPos += lineHeight;
            doc.text(`Email: ${email}`, xPos, yPos);

            // Save File
            doc.save(`Cover_Letter_${domain.replace('.', '_')}.pdf`);
        }
    </script>
</body>
</html>
