<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEB/SEE GPA Calculator Nepal | Grade Point Average</title>
    <meta name="description" content="Calculate your GPA for SEE and NEB exams. Free Nepal GPA calculator with weighted credit hours. Get accurate grade point average based on NEB grading scale.">
    <meta name="keywords" content="GPA calculator Nepal, NEB GPA calculator, SEE GPA, grade point average Nepal, NEB grading scale, GPA calculator with credits">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://securexlab.com/tools/gpa-calculator/">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7365011588835579"
     crossorigin="anonymous"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col text-slate-900">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="../../index.html" class="text-slate-500 hover:text-blue-600 flex items-center gap-1 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                    Back to Hub
                </a>
                <span class="font-bold text-slate-800">SecureX Lab <span class="text-blue-600">Tools</span></span>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto w-full px-4 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Input Form -->
            <div class="lg:col-span-2 space-y-6">
                <div class="flex items-center justify-between">
                    <h1 class="text-2xl font-bold">GPA Calculator</h1>
                    <button onclick="addRow()" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-bold hover:bg-slate-900 transition-all">+ Add Subject</button>
                </div>

                <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Subject</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Credit (CH)</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Marks (%)</th>
                                <th class="px-6 py-4"></th>
                            </tr>
                        </thead>
                        <tbody id="subjectBody">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Result Sidebar -->
            <div class="space-y-6">
                <div class="bg-blue-600 rounded-3xl p-8 text-white shadow-xl shadow-blue-100">
                    <p class="text-blue-100 text-xs font-bold uppercase tracking-widest">Final Weighted GPA</p>
                    <h2 id="finalGpa" class="text-6xl font-black mt-2">0.00</h2>
                    <div class="mt-6 pt-6 border-t border-blue-500/50 flex justify-between items-center">
                        <span class="text-blue-100 text-sm">Overall Grade</span>
                        <span id="finalGrade" class="text-2xl font-bold">NG</span>
                    </div>
                </div>

                <div class="bg-white rounded-3xl p-6 border border-slate-200">
                    <h3 class="font-bold text-slate-800 mb-4">Grading Scale (NEB)</h3>
                    <div class="space-y-2 text-xs">
                        <div class="flex justify-between"><span>90 - 100</span> <span class="font-bold">A+ (4.0)</span></div>
                        <div class="flex justify-between"><span>80 - 89</span> <span class="font-bold">A (3.6)</span></div>
                        <div class="flex justify-between"><span>70 - 79</span> <span class="font-bold">B+ (3.2)</span></div>
                        <div class="flex justify-between"><span>60 - 69</span> <span class="font-bold">B (2.8)</span></div>
                        <div class="flex justify-between"><span>35 - 59</span> <span class="font-bold">C (2.4)</span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const subjectBody = document.getElementById('subjectBody');

        function addRow() {
            const row = document.createElement('tr');
            row.className = "border-b border-slate-100 group";
            row.innerHTML = `
                <td class="px-6 py-4"><input type="text" placeholder="e.g. Physics" class="w-full bg-transparent outline-none font-medium"></td>
                <td class="px-6 py-4"><input type="number" step="0.5" value="4" class="ch-input w-16 bg-slate-50 border border-slate-200 rounded p-1 text-center outline-none focus:border-blue-500"></td>
                <td class="px-6 py-4"><input type="number" value="0" class="marks-input w-16 bg-slate-50 border border-slate-200 rounded p-1 text-center outline-none focus:border-blue-500"></td>
                <td class="px-6 py-4 text-right"><button onclick="this.parentElement.parentElement.remove(); calculateGpa();" class="text-slate-300 hover:text-red-500 transition-colors">✕</button></td>
            `;
            subjectBody.appendChild(row);
            
            // Listen for changes
            row.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', calculateGpa);
            });
            calculateGpa();
        }

        function getGp(marks) {
            if (marks >= 90) return { gp: 4.0, g: 'A+' };
            if (marks >= 80) return { gp: 3.6, g: 'A' };
            if (marks >= 70) return { gp: 3.2, g: 'B+' };
            if (marks >= 60) return { gp: 2.8, g: 'B' };
            if (marks >= 50) return { gp: 2.4, g: 'C+' };
            if (marks >= 40) return { gp: 2.0, g: 'C' };
            if (marks >= 35) return { gp: 1.6, g: 'D' };
            return { gp: 0, g: 'NG' };
        }

        function calculateGpa() {
            const rows = subjectBody.querySelectorAll('tr');
            let totalWeightedGp = 0;
            let totalCreditHours = 0;

            rows.forEach(row => {
                const ch = parseFloat(row.querySelector('.ch-input').value) || 0;
                const marks = parseFloat(row.querySelector('.marks-input').value) || 0;
                
                const result = getGp(marks);
                totalWeightedGp += (result.gp * ch);
                totalCreditHours += ch;
            });

            const gpa = totalCreditHours > 0 ? (totalWeightedGp / totalCreditHours) : 0;
            document.getElementById('finalGpa').innerText = gpa.toFixed(2);
            
            // Determine Final Grade
            const finalResult = getGp(gpa * 25); // Mapping GPA back to relative marks for text grade
            document.getElementById('finalGrade').innerText = finalResult.g;
        }

        // Initial 4 subjects
        for(let i=0; i<4; i++) addRow();
    </script>
</body>
</html>
